# Nginx/OpenResty 配置：your-domain.com
# TLS + 反代 API + 托管前端静态文件
#
# 使用方式：放到你的站点配置目录下（如 /opt/1panel/www/sites/your-domain.com/），
# 或通过 1Panel / 宝塔等面板创建反向代理站点后覆盖配置。

server {
    listen 80;
    server_name your-domain.com;
    # HTTP → HTTPS 重定向
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # TLS 证书（面板管理，路径根据实际调整）
    ssl_certificate     /opt/1panel/www/sites/your-domain.com/ssl/fullchain.pem;
    ssl_certificate_key /opt/1panel/www/sites/your-domain.com/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 前端静态文件
    root /opt/private-kb/web/dist;
    index index.html;

    # 上传文件大小限制
    client_max_body_size 60m;

    # SPA fallback（前端路由）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式支持（关键！不 buffer 流式响应）
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        # 超时（LLM 调用可能较慢）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查（不记日志）
    location = /api/health {
        proxy_pass http://127.0.0.1:8787;
        access_log off;
    }
}
