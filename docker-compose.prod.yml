# 生产部署 compose：app + worker + PostgreSQL(pgvector)
# Redis 复用宿主机已有的 redis 容器（通过 Docker 网络）
services:
  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: private-kb-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-kb}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD required}
      POSTGRES_DB: ${PG_DB:-private_kb}
    volumes:
      - kb_pg_data:/var/lib/postgresql/data
    command: >
      bash -c "
        docker-entrypoint.sh postgres &
        until pg_isready -U ${PG_USER:-kb}; do sleep 1; done
        psql -U ${PG_USER:-kb} -d ${PG_DB:-private_kb} -c 'CREATE EXTENSION IF NOT EXISTS vector;'
        psql -U ${PG_USER:-kb} -d ${PG_DB:-private_kb} -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm;'
        psql -U ${PG_USER:-kb} -d ${PG_DB:-private_kb} -c 'CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";'
        wait
      "
    # 不暴露端口到宿主机（仅 Docker 网络内可达）
    networks:
      - default
      - external-network  # 连接到宿主机已有网络，与 Redis 互通

  # API 服务
  api:
    build: .
    container_name: private-kb-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://${PG_USER:-kb}:${PG_PASSWORD:?PG_PASSWORD required}@postgres:5432/${PG_DB:-private_kb}
      # Redis 复用宿主机的容器（通过 Docker 网络，需密码）
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/1
      NODE_ENV: production
      PORT: 8787
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      ENC_KEY: ${ENC_KEY:?ENC_KEY required}
      CHAT_BASE_URL: ${CHAT_BASE_URL:-https://api.deepseek.com/v1}
      CHAT_API_KEY: ${CHAT_API_KEY:?CHAT_API_KEY required}
      CHAT_MODEL: ${CHAT_MODEL:-deepseek-v4-pro}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:?EMBEDDING_API_KEY required}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embedding-3}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    volumes:
      - kb_uploads:/app/data/uploads
    ports:
      - "127.0.0.1:8787:8787"
    networks:
      - default
      - external-network

  # Worker 服务（同一镜像，不同 command）
  worker:
    build: .
    container_name: private-kb-worker
    restart: unless-stopped
    depends_on:
      - postgres
      - api
    environment:
      DATABASE_URL: postgres://${PG_USER:-kb}:${PG_PASSWORD:?PG_PASSWORD required}@postgres:5432/${PG_DB:-private_kb}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/1
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      ENC_KEY: ${ENC_KEY:?ENC_KEY required}
      CHAT_BASE_URL: ${CHAT_BASE_URL:-https://api.deepseek.com/v1}
      CHAT_API_KEY: ${CHAT_API_KEY:?CHAT_API_KEY required}
      CHAT_MODEL: ${CHAT_MODEL:-deepseek-v4-pro}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:?EMBEDDING_API_KEY required}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embedding-3}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    volumes:
      - kb_uploads:/app/data/uploads
    command: ["npx", "tsx", "server/src/jobs/worker.ts"]
    networks:
      - default
      - external-network

volumes:
  kb_pg_data:
  kb_uploads:

networks:
  default:
  external-network:
    external: true
